# go-task runner for the chezmoi dotfiles repo.
# Source-only: excluded from chezmoi apply via .chezmoiignore.
# Invoked as `task <name>` (go-task, installed via mise; see mise.toml).
# Outside this repo, `task` resolves to Taskwarrior (brew).
# Docs: https://taskfile.dev/

version: "3"

vars:
  TF_STATE_BUCKET: mbastakis-homeserver-opentofu-state
  TF_STATE_REGION: eu-central-1

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  update:
    desc: git pull + chezmoi apply
    cmds:
      - chezmoi update

  lint:
    desc: Run all lint checks on the whole tree
    cmds:
      - pre-commit run --all-files
      - pre-commit run shellcheck --all-files
      - pre-commit run gitleaks --all-files

  tf:bootstrap-state:
    desc: One-time create/adopt the OpenTofu S3 backend and migrate bootstrap state
    cmds:
      - bash infra/terraform/bootstrap/create-state-backend.sh {{.CLI_ARGS}}

  tf:backend:check:
    desc: Verify the fixed OpenTofu S3 backend exists
    cmds:
      - |
        set -euo pipefail
        printf '%s\n' "Checking OpenTofu backend bucket {{.TF_STATE_BUCKET}} in {{.TF_STATE_REGION}}..."
        aws-login exec mbastakis -- aws s3api head-bucket \
          --bucket "{{.TF_STATE_BUCKET}}" \
          --region "{{.TF_STATE_REGION}}"

  tf:bootstrap:init:
    desc: Initialize the bootstrap OpenTofu stack against the remote S3 backend
    dir: infra/terraform/bootstrap
    cmds:
      - task: tf:backend:check
      - |
        set -euo pipefail
        if ! aws-login exec mbastakis -- aws s3api head-object \
          --bucket "{{.TF_STATE_BUCKET}}" \
          --key "homeserver/bootstrap/terraform.tfstate" \
          --region "{{.TF_STATE_REGION}}" &>/dev/null; then
          printf '%s\n' "Bootstrap remote state is missing. Run: task tf:bootstrap-state" >&2
          exit 1
        fi

        cat > backend.generated.tf <<'EOF'
        # Generated by Taskfile.yml. Do not commit.
        terraform {
          backend "s3" {}
        }
        EOF
        aws-login exec mbastakis -- tofu init \
          -input=false \
          -reconfigure \
          -backend-config="bucket={{.TF_STATE_BUCKET}}" \
          -backend-config="key=homeserver/bootstrap/terraform.tfstate" \
          -backend-config="region={{.TF_STATE_REGION}}" \
          -backend-config="encrypt=true" \
          -backend-config="use_lockfile=true"

  tf:bootstrap:plan:
    desc: Plan the bootstrap OpenTofu stack that owns the S3 backend bucket
    dir: infra/terraform/bootstrap
    cmds:
      - task: tf:bootstrap:init
      - aws-login exec mbastakis -- tofu plan {{.CLI_ARGS}}

  tf:bootstrap:apply:
    desc: Apply the bootstrap OpenTofu stack that owns the S3 backend bucket
    dir: infra/terraform/bootstrap
    cmds:
      - task: tf:bootstrap:init
      - aws-login exec mbastakis -- tofu apply {{.CLI_ARGS}}

  tf:fmt:
    desc: Format all OpenTofu files
    cmds:
      - tofu fmt -recursive infra/terraform

  tf:fmt:check:
    desc: Check formatting for all OpenTofu files
    cmds:
      - tofu fmt -recursive -check -diff infra/terraform

  tf:validate:
    desc: Validate homeserver OpenTofu stacks without configuring the remote backend
    cmds:
      - |
        set -euo pipefail
        tf_data_root="$(mktemp -d)"
        trap 'rm -rf "$tf_data_root"' EXIT

        for stack in infra/terraform/bootstrap infra/terraform/dns infra/terraform/aws-foundation infra/terraform/truenas infra/terraform/authentik; do
          stack_name="$(basename "$stack")"
          export TF_DATA_DIR="$tf_data_root/$stack_name"
          tofu -chdir="$stack" init -backend=false -reconfigure -input=false
          tofu -chdir="$stack" validate
        done

  tf:tflint:
    desc: Run TFLint for homeserver OpenTofu stacks
    cmds:
      - |
        tflint --init --config="${PWD}/.tflint.hcl"
        for stack in infra/terraform/bootstrap infra/terraform/dns infra/terraform/aws-foundation infra/terraform/truenas infra/terraform/authentik; do
          tflint --chdir="$stack" --config="${PWD}/.tflint.hcl"
        done

  tf:docs:
    desc: Regenerate terraform-docs output for homeserver OpenTofu stacks
    cmds:
      - terraform-docs --config .terraform-docs.yml infra/terraform/bootstrap
      - terraform-docs --config .terraform-docs.yml infra/terraform/dns
      - terraform-docs --config .terraform-docs.yml infra/terraform/aws-foundation
      - terraform-docs --config .terraform-docs.yml infra/terraform/truenas
      - terraform-docs --config .terraform-docs.yml infra/terraform/authentik

  tf:dns:init:
    desc: Initialize the DNS OpenTofu stack
    dir: infra/terraform/dns
    cmds:
      - task: tf:backend:check
      - |
        aws-login exec mbastakis -- tofu init \
          -input=false \
          -reconfigure \
          -backend-config="bucket={{.TF_STATE_BUCKET}}" \
          -backend-config="key=homeserver/dns/terraform.tfstate" \
          -backend-config="region={{.TF_STATE_REGION}}" \
          -backend-config="encrypt=true" \
          -backend-config="use_lockfile=true"

  tf:dns:plan:
    desc: Plan the DNS OpenTofu stack
    dir: infra/terraform/dns
    cmds:
      - task: tf:dns:init
      - aws-login exec mbastakis -- tofu plan {{.CLI_ARGS}}

  tf:dns:apply:
    desc: Apply the DNS OpenTofu stack
    dir: infra/terraform/dns
    cmds:
      - task: tf:dns:init
      - aws-login exec mbastakis -- tofu apply {{.CLI_ARGS}}

  tf:aws-foundation:init:
    desc: Initialize the AWS foundation OpenTofu stack
    dir: infra/terraform/aws-foundation
    cmds:
      - task: tf:backend:check
      - |
        aws-login exec mbastakis -- tofu init \
          -input=false \
          -reconfigure \
          -backend-config="bucket={{.TF_STATE_BUCKET}}" \
          -backend-config="key=homeserver/aws-foundation/terraform.tfstate" \
          -backend-config="region={{.TF_STATE_REGION}}" \
          -backend-config="encrypt=true" \
          -backend-config="use_lockfile=true"

  tf:aws-foundation:plan:
    desc: Plan the AWS foundation OpenTofu stack
    dir: infra/terraform/aws-foundation
    cmds:
      - task: tf:aws-foundation:init
      - aws-login exec mbastakis -- tofu plan {{.CLI_ARGS}}

  tf:aws-foundation:apply:
    desc: Apply the AWS foundation OpenTofu stack
    dir: infra/terraform/aws-foundation
    cmds:
      - task: tf:aws-foundation:init
      - aws-login exec mbastakis -- tofu apply {{.CLI_ARGS}}

  tf:authentik:init:
    desc: Initialize the Authentik OpenTofu stack
    dir: infra/terraform/authentik
    cmds:
      - task: tf:backend:check
      - |
        aws-login exec mbastakis -- tofu init \
          -input=false \
          -reconfigure \
          -backend-config="bucket={{.TF_STATE_BUCKET}}" \
          -backend-config="key=homeserver/authentik/terraform.tfstate" \
          -backend-config="region={{.TF_STATE_REGION}}" \
          -backend-config="encrypt=true" \
          -backend-config="use_lockfile=true"

  tf:authentik:plan:
    desc: Plan the Authentik OpenTofu stack
    cmds:
      - task: tf:authentik:init
      - infra/secrets/homeserver-secrets exec terraform-authentik -- tofu -chdir=infra/terraform/authentik plan {{.CLI_ARGS}}

  tf:authentik:apply:
    desc: Apply the Authentik OpenTofu stack
    cmds:
      - task: tf:authentik:init
      - infra/secrets/homeserver-secrets exec terraform-authentik -- tofu -chdir=infra/terraform/authentik apply {{.CLI_ARGS}}

  tf:truenas:init:
    desc: Initialize the TrueNAS OpenTofu stack
    dir: infra/terraform/truenas
    cmds:
      - task: tf:backend:check
      - |
        aws-login exec mbastakis -- tofu init \
          -input=false \
          -reconfigure \
          -backend-config="bucket={{.TF_STATE_BUCKET}}" \
          -backend-config="key=homeserver/truenas/terraform.tfstate" \
          -backend-config="region={{.TF_STATE_REGION}}" \
          -backend-config="encrypt=true" \
          -backend-config="use_lockfile=true"

  tf:truenas:plan:
    desc: Plan the TrueNAS OpenTofu stack
    dir: infra/terraform/truenas
    cmds:
      - task: tf:truenas:init
      - |
        key_path="${TRUENAS_SSH_PRIVATE_KEY_PATH:-$HOME/.ssh/id_ed25519}"
        if [[ ! -r "$key_path" ]]; then
          printf '%s\n' "TrueNAS SSH private key is not readable: $key_path" >&2
          printf '%s\n' "Set TRUENAS_SSH_PRIVATE_KEY_PATH to override the default." >&2
          exit 1
        fi
        export TF_VAR_truenas_ssh_private_key="$(< "$key_path")"
        aws-login exec mbastakis -- tofu plan {{.CLI_ARGS}}

  tf:truenas:apply:
    desc: Apply the TrueNAS OpenTofu stack
    dir: infra/terraform/truenas
    cmds:
      - task: tf:truenas:init
      - |
        key_path="${TRUENAS_SSH_PRIVATE_KEY_PATH:-$HOME/.ssh/id_ed25519}"
        if [[ ! -r "$key_path" ]]; then
          printf '%s\n' "TrueNAS SSH private key is not readable: $key_path" >&2
          printf '%s\n' "Set TRUENAS_SSH_PRIVATE_KEY_PATH to override the default." >&2
          exit 1
        fi
        export TF_VAR_truenas_ssh_private_key="$(< "$key_path")"
        aws-login exec mbastakis -- tofu apply {{.CLI_ARGS}}

  tailscale:policy:validate:
    desc: Validate the homeserver Tailscale policy through the Tailscale API
    cmds:
      - bash infra/tailscale/manage-policy validate {{.CLI_ARGS}}

  tailscale:policy:apply:
    desc: Apply the homeserver Tailscale policy through the Tailscale API
    cmds:
      - bash infra/tailscale/manage-policy apply {{.CLI_ARGS}}

  truenas:bootstrap-ssh-key:
    desc: Bootstrap TrueNAS key-based SSH access for OpenTofu
    cmds:
      - bash infra/truenas/bootstrap-ssh-key.sh {{.CLI_ARGS}}

  truenas:apps:plan:
    desc: Show TrueNAS catalog app declarations and required secret refs
    cmds:
      - bash infra/truenas/apps/manage-apps plan {{.CLI_ARGS}}

  truenas:apps:apply:
    desc: Apply TrueNAS catalog app declarations over SSH/midclt
    cmds:
      - bash infra/truenas/apps/manage-apps apply {{.CLI_ARGS}}

  brew:dump:
    desc: Refresh Brewfile from currently installed formulas/casks
    cmds:
      - brew bundle dump --force --file=private_dot_config/brew/Brewfile

  docs:serve:
    desc: Serve the docsify documentation locally on http://localhost:3000
    cmds:
      - npx docsify-cli serve docs
