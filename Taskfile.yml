# go-task runner for the chezmoi dotfiles repo.
# Source-only: excluded from chezmoi apply via .chezmoiignore.
# Invoked as `task <name>` (go-task, installed via mise; see mise.toml).
# Outside this repo, `task` resolves to Taskwarrior (brew).
# Docs: https://taskfile.dev/

version: "3"

vars:
  TF_STATE_BUCKET: mbastakis-homeserver-opentofu-state
  TF_STATE_REGION: eu-central-1

includes:
  infra:
    taskfile: ./infra/Taskfile.yml
    dir: .
  tf:
    taskfile: ./infra/tofu.Taskfile.yml
    dir: .
  aws:
    taskfile: ./infra/aws/Taskfile.yml
    dir: .
  atlas:
    taskfile: ./infra/atlas/Taskfile.yml
    dir: .
  truenas:
    taskfile: ./infra/truenas/Taskfile.yml
    dir: .
  identity:
    taskfile: ./infra/identity/Taskfile.yml
    dir: .
  network:
    taskfile: ./infra/network/Taskfile.yml
    dir: .
  sync:
    taskfile: ./infra/sync/Taskfile.yml
    dir: .

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  update:
    desc: git pull + chezmoi apply
    cmds:
      - chezmoi update

  lint:
    desc: Run all lint checks on the whole tree
    cmds:
      - pre-commit run --all-files
      - pre-commit run shellcheck --all-files
      - pre-commit run gitleaks --all-files

  brew:dump:
    desc: Refresh Brewfile from currently installed formulas/casks
    cmds:
      - brew bundle dump --force --file=private_dot_config/brew/Brewfile

  docs:serve:
    desc: Serve the docsify documentation locally on http://localhost:3000
    cmds:
      - npx docsify-cli serve docs
