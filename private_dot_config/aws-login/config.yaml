# AWS Login Configuration
# ~/.config/aws-login/config.yaml

defaults:
  region: eu-central-1
  cache_ttl_buffer: 300      # Refresh if expiring within 5 min

starship:
  enabled: true
  timer_prefix: aws-session-

bitwarden:
  enabled: true

profiles:
  playground:
    type: mfa
    description: "AWS Playground - Requires MFA"
    bitwarden_item: "AWS Playground"
    mfa_serial: auto          # Read from ~/.aws/config
    session_duration: 12h
    max-hour: 12
    env:
      KUBECONFIG: ~/.kube/config-playground

  dev:
    type: cloudshepherd
    description: "Development environment"
    auth_url: https://auth2.cs.telekom.de
    api_url: https://api.cs.telekom.de/public
    account: "076811069858"
    role: CS_DTIT_Project_Admin
    otp_source: bitwarden
    bitwarden_item: "auth.devops.telekom.de"
    storage: file
    min_ttl: 20
    max-hour: 4
    env:
      KUBECONFIG: ~/.kube/config-dev

  prod:
    type: cloudshepherd
    description: "Production environment"
    auth_url: https://auth2.cs.telekom.de
    api_url: https://api.cs.telekom.de/public
    account: "620453162886"
    role: CS_DTIT_Project_Admin
    otp_source: bitwarden
    bitwarden_item: "auth.devops.telekom.de"
    storage: file
    min_ttl: 20
    max-hour: 4
    env:
      KUBECONFIG: ~/.kube/config-prod

  claude-code:
    type: cloudshepherd
    description: "Claude Code profile"
    auth_url: https://auth2.cs.telekom.de
    api_url: https://api.cs.telekom.de/public
    account: "110869144691"
    role: CS_DTIT_Bedrock_User
    otp_source: bitwarden
    bitwarden_item: "auth.devops.telekom.de"
    storage: file
    min_ttl: 20
    max-hour: 3
