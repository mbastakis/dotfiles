# AWS Login Configuration
# ~/.config/aws-login/config.yaml

defaults:
  region: eu-central-1
  cache_ttl_buffer: 300      # Refresh if expiring within 5 min

starship:
  enabled: true
  timer_prefix: aws-session-

bitwarden:
  enabled: true

profiles:
  aicc-playground:
    type: mfa
    description: "AWS Playground - Requires MFA"
    bitwarden_item: "AWS Playground"
    mfa_serial: auto          # Read from ~/.aws/config
    session_duration: 12h
    max-hour: 12
    env:
      KUBECONFIG: ~/.config/kube/config-playground

  mbastakis:
    type: sso
    description: "Personal AWS account - AdministratorAccess"
    sso_start_url: "https://d-c36703a864.awsapps.com/start"
    sso_region: eu-central-1
    sso_account_id: "308721625651"
    sso_role_name: AdministratorAccess
    region: eu-central-1

  aicc-dev:
    type: cloudshepherd
    description: "Development environment"
    auth_url: https://auth2.cs.telekom.de
    api_url: https://api.cs.telekom.de/public
    account: "076811069858"
    role: CS_DTIT_Project_Admin
    otp_source: bitwarden
    bitwarden_item: "auth.devops.telekom.de"
    storage: file
    min_ttl: 20
    max-hour: 4
    env:
      KUBECONFIG: ~/.config/kube/config-dev

  aicc-prod:
    type: cloudshepherd
    description: "Production environment"
    auth_url: https://auth2.cs.telekom.de
    api_url: https://api.cs.telekom.de/public
    account: "620453162886"
    role: CS_DTIT_Project_Admin
    otp_source: bitwarden
    bitwarden_item: "auth.devops.telekom.de"
    storage: file
    min_ttl: 20
    max-hour: 4
    env:
      KUBECONFIG: ~/.config/kube/config-prod
