# AWS Login Configuration Example
# Copy to ~/.config/aws-login/config.yaml and customize.

defaults:
  region: eu-central-1
  cache_ttl_buffer: 300 # seconds

# Optional cache override.
# By default aws-login uses:
#   $XDG_CACHE_HOME/aws-login
# or ~/.cache/aws-login when XDG_CACHE_HOME is not set.
# cache:
#   directory: ~/.cache/aws-login

starship:
  enabled: true
  timer_prefix: aws-session-

bitwarden:
  enabled: true

profiles:
  playground:
    type: mfa
    description: "AWS Playground - Requires MFA"
    bitwarden_item: "AWS Playground"
    mfa_serial: auto
    session_duration: 12h

  dev:
    type: cloudshepherd
    description: "Development environment"
    auth_url: https://auth2.cs.telekom.de
    api_url: https://api.cs.telekom.de/public
    account: "076811069858"
    role: CS_DTIT_Project_Admin
    otp_source: bitwarden
    bitwarden_item: "auth.devops.telekom.de"
    storage: file
    min_ttl: 20

  prod:
    type: cloudshepherd
    description: "Production environment"
    auth_url: https://auth2.cs.telekom.de
    api_url: https://api.cs.telekom.de/public
    account: "620453162886"
    role: CS_DTIT_Project_Admin
    otp_source: bitwarden # or "prompt"
    bitwarden_item: "auth.devops.telekom.de"
    storage: file # or "keyring"
    min_ttl: 20
