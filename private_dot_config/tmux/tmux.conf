# ================================
# Input and key bindings
# ================================

# Enable Ctrl+Tab / Ctrl+Shift+Tab support for window navigation.
set -s extended-keys on
set -s extended-keys-format xterm
set -as terminal-features 'xterm-ghostty:extkeys'
set -as terminal-features 'xterm*:extkeys'
set -as terminal-features 'tmux-256color:extkeys'
bind-key -n C-Tab next-window
bind-key -n C-S-Tab previous-window
bind-key -n C-BTab previous-window
bind-key -n BTab previous-window
bind-key -n S-Enter send-keys Escape "[13;2u"

# Prefix key
set -g prefix C-a

# Ensure run-shell commands can find Homebrew binaries on macOS.
set-environment -g PATH "/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"

# Pane and copy-mode key bindings
bind-key h split-window -h -c "#{pane_current_path}"
bind-key v split-window -v -c "#{pane_current_path}"
bind-key c new-window -c "#{pane_current_path}"
# bind-key x confirm-before -p "Kill this pane? (y/n)" kill-pane
bind-key x kill-pane
bind-key p previous-window
bind-key o split-window -h -c "#{pane_current_path}" "opencode-launch"
bind-key G display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"

setw -g mode-keys vi
bind-key -T copy-mode-vi Escape send-keys -X cancel
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# Resize panes with arrow keys (prefix + arrow)
bind-key -r Left resize-pane -L 5
bind-key -r Down resize-pane -D 5
bind-key -r Up resize-pane -U 5
bind-key -r Right resize-pane -R 5

# Resize panes without prefix (Ctrl+Shift + arrow)
bind-key -n C-S-Left resize-pane -L 5
bind-key -n C-S-Down resize-pane -D 5
bind-key -n C-S-Up resize-pane -U 5
bind-key -n C-S-Right resize-pane -R 5

# ================================
# Plugins (TPM)
# ================================

set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'azorng/tmux-smooth-scroll'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'Chaitanyabsprip/tmux-harpoon'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# ================================
# Plugin options
# ================================

# Catppuccin: show window names (manual rename friendly).
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

# Catppuccin: show only time in a right-side rounded pill.
set -g @catppuccin_date_time_icon "󰃭 "
set -g @catppuccin_date_time_text " %H:%M "
set -g @catppuccin_status_right_separator ""

# Sesh session picker on prefix+s.
bind-key s display-popup -E -w 45% -h 80% -d "#{pane_current_path}" -T "sesh" "~/bin/sesh-picker"

# Rename current tmux session on prefix+R.
bind-key R display-popup -E -w 45% -h 8 -T "rename session" "~/bin/sesh-rename"

# Floax on prefix+P; keep prefix+p for previous-window.
set -g @floax-bind 'P'
set -g @floax-bind-menu 'M-P'

# Oasis-style mode indicator (icon + mode label).
set -g @mode_indicator_color "\
#{?client_prefix,#{@thm_red},\
#{?#{==:#{pane_mode},copy-mode},#{@thm_peach},\
#{?#{==:#{pane_mode},view-mode},#{@thm_yellow},\
#{?#{||:#{==:#{pane_mode},tree-mode},#{==:#{pane_mode},client-mode}},#{@thm_green},\
#{?#{==:#{pane_mode},options-mode},#{@thm_mauve},\
#{?#{==:#{pane_mode},clock-mode},#{@thm_sky},\
#{?window_zoomed_flag,#{@thm_teal},\
#{@thm_lavender}\
}}}}}}}"

set -g @mode_indicator_icon "\
#{?client_prefix,,\
#{?#{==:#{pane_mode},copy-mode},,\
#{?#{==:#{pane_mode},view-mode},,\
#{?#{||:#{==:#{pane_mode},tree-mode},#{==:#{pane_mode},client-mode}},,\
#{?#{==:#{pane_mode},options-mode},,\
#{?#{==:#{pane_mode},clock-mode},,\
#{?window_zoomed_flag,,\
\
}}}}}}}"

set -g @mode_indicator_label "\
#{?client_prefix,COMMAND ,\
#{?#{==:#{pane_mode},copy-mode},COPY ,\
#{?#{==:#{pane_mode},view-mode},VIEW ,\
#{?#{||:#{==:#{pane_mode},tree-mode},#{==:#{pane_mode},client-mode}},CHOOSE ,\
#{?#{==:#{pane_mode},options-mode},OPTIONS ,\
#{?#{==:#{pane_mode},clock-mode},CLOCK ,\
#{?window_zoomed_flag,ZOOM,\
NORMAL \
}}}}}}}"

set -g @session_right_segment "#[fg=#{@thm_blue},bold]󰍹 #{session_name}#[default]"
set -g @mode_indicator_segment "#[fg=#{E:@mode_indicator_color}]#{E:@mode_indicator_icon} #[fg=#{E:@mode_indicator_color},bold]#{E:@mode_indicator_label}#[default]"

# Harpoon quick slots (Ctrl+Command + a/o/e/u) for jumping.
set -g @harpoon_key_append1 'C-M-a'
set -g @harpoon_key_append2 'C-M-o'
set -g @harpoon_key_append3 'C-M-e'
set -g @harpoon_key_append4 'C-M-u'

# Harpoon slot overwrite (Ctrl+Command+Shift + a/o/e/u) for current pane.
bind-key -n C-M-S-a run-shell "~/bin/harpoon-replace-pane 1"
bind-key -n C-M-S-o run-shell "~/bin/harpoon-replace-pane 2"
bind-key -n C-M-S-e run-shell "~/bin/harpoon-replace-pane 3"
bind-key -n C-M-S-u run-shell "~/bin/harpoon-replace-pane 4"

# Compatibility aliases for terminals that emit uppercase key names.
bind-key -n C-M-A run-shell "~/bin/harpoon-replace-pane 1"
bind-key -n C-M-O run-shell "~/bin/harpoon-replace-pane 2"
bind-key -n C-M-E run-shell "~/bin/harpoon-replace-pane 3"
bind-key -n C-M-U run-shell "~/bin/harpoon-replace-pane 4"

# Harpoon management keys.
bind-key a send-prefix
bind-key A run-shell "~/.config/tmux/plugins/tmux-harpoon/harpoon -a"
bind-key D run-shell "~/.config/tmux/plugins/tmux-harpoon/harpoon -d"
bind-key g run-shell "~/.config/tmux/plugins/tmux-harpoon/harpoon -l"
bind-key e run-shell "EDITOR=\${EDITOR:-vi} ~/.config/tmux/plugins/tmux-harpoon/harpoon -e"
bind-key d detach-client

# Smooth scroll
# Mouse wheel is disabled to prevent a pathological interaction with
# Ghostty + OpenCode: touchpad emits ~60 wheel events/sec; tmux's default
# root binding enters copy-mode when alternate_on is off (e.g. during
# OpenCode startup), where this plugin rebinds WheelUp/Down to spawn
# bash+bash+perl per event. Animators saturate tmux's command channel,
# producing severe input lag that degrades over time. Keyboard smooth
# scroll (J/K, C-d/C-u, PageUp/Down) is unaffected.
set -g @smooth-scroll-speed "100"
set -g @smooth-scroll-easing "sine"
set -g @smooth-scroll-normal "3"
set -g @smooth-scroll-halfpage ""  # Default: pane_height / 2
set -g @smooth-scroll-fullpage ""  # Default: pane_height
set -g @smooth-scroll-mouse "false"

# Continuum + Resurrect
# Continuum's auto-restore is disabled because its multi-server detection
# (`another_tmux_server_running_on_startup`) miscounts processes on macOS,
# silently skipping restore (continuum#152).  ~/bin/tmux-restore handles
# restore with save-file validation and automatic fallback to recent backups.
set -g @continuum-restore 'off'
set -g @continuum-save-interval '15'
set -g @continuum-boot 'off'
set -g @resurrect-dir '~/.local/share/tmux/resurrect'
set -g @resurrect-processes '"~opencode->opencode-launch --continue"'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-pane-contents-area 'full'

# ================================
# Core tmux options
# ================================

set -g base-index 1
setw -g pane-base-index 1
set -g detach-on-destroy off
set -g renumber-windows on
set -g mouse on
set -g history-limit 100000
set -s escape-time 0
set -s set-clipboard external
set -g allow-passthrough on
set -s copy-command "pbcopy"
set -g allow-rename on

# Status line
set -g status-position top
set -g status-left ""
set -g status-left-length 1
set -g status-right "#{E:@mode_indicator_segment} #[fg=#{@thm_overlay0}]#[default] #{E:@session_right_segment} "
set -g status-right-length 120

# Initialize TPM (must stay at the end of the plugin section)
if "test ! -d ~/.config/tmux/plugins/tpm" "run 'mkdir -p ~/.config/tmux/plugins && git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"
run '~/.config/tmux/plugins/tpm/tpm'

# ================================
# Post-TPM: restore & save hooks
# ================================

# Custom restore — runs after TPM sets @resurrect-restore-script-path.
# Validates the save file (falls back to recent backups if corrupt).
run-shell -b 'sleep 1 && ~/bin/tmux-restore'

# Save session state on every client detach (catches Ghostty close / shutdown).
set-hook -g client-detached 'run-shell -b "#{@resurrect-save-script-path} quiet"'
