{{- /* chezmoi:modify-template */ -}}
{{- if .chezmoi.stdin -}}
{{ .chezmoi.stdin }}{{- else -}}
{{- /*
  Seed config for new machines. Existing glab config can contain auth fields
  and timestamps written by glab, so the live file is preserved byte-for-byte.
*/ -}}
check_update: true
display_hyperlinks: true
git_protocol: https
glab_pager: bat
glamour_style: dark
host: gitlab.devops.telekom.de
hostname: gitlab.devops.telekom.de
hosts:
    gitlab.com:
        api_host: gitlab.com
        api_protocol: ssh
        container_registry_domains:
            - gitlab.com
            - gitlab.com:443
            - registry.gitlab.com
    gitlab.devops.telekom.de:
        api_host: gitlab.devops.telekom.de
        api_protocol: https
        container_registry_domains:
            - gitlab.devops.telekom.de
            - gitlab.devops.telekom.de:443
            - registry.gitlab.devops.telekom.de
        email: michail.bastakis@telekom.com
        git_protocol: https
        user: michail.bastakis
no_prompt: false
telemetry: false
{{- end -}}
