version: "3"

tasks:
  bootstrap-state:
    desc: One-time create or adopt the OpenTofu state backend
    cmds:
      - bash infra/aws/stacks/bootstrap/create-state-backend.sh {{.CLI_ARGS}}

  backend:check:
    desc: Verify the fixed OpenTofu S3 backend exists
    cmds:
      - |
        set -euo pipefail
        printf '%s\n' "Checking OpenTofu backend bucket {{.TF_STATE_BUCKET}} in {{.TF_STATE_REGION}}..."
        aws-login exec mbastakis -- aws s3api head-bucket \
          --bucket "{{.TF_STATE_BUCKET}}" \
          --region "{{.TF_STATE_REGION}}"

  status:
    desc: Plan all AWS OpenTofu stacks without applying changes
    cmds:
      - task: bootstrap:plan
      - task: dns:plan
      - task: foundation:plan

  bootstrap:init:
    desc: Initialize the bootstrap OpenTofu stack
    dir: infra/aws/stacks/bootstrap
    cmds:
      - task: backend:check
      - |
        set -euo pipefail
        if ! aws-login exec mbastakis -- aws s3api head-object \
          --bucket "{{.TF_STATE_BUCKET}}" \
          --key "homeserver/bootstrap/terraform.tfstate" \
          --region "{{.TF_STATE_REGION}}" &>/dev/null; then
          printf '%s\n' "Bootstrap remote state is missing. Run: task aws:bootstrap-state" >&2
          exit 1
        fi

        cat > backend.generated.tf <<'EOF'
        # Generated by Taskfile.yml. Do not commit.
        terraform {
          backend "s3" {}
        }
        EOF
        aws-login exec mbastakis -- tofu init \
          -input=false \
          -reconfigure \
          -backend-config="bucket={{.TF_STATE_BUCKET}}" \
          -backend-config="key=homeserver/bootstrap/terraform.tfstate" \
          -backend-config="region={{.TF_STATE_REGION}}" \
          -backend-config="encrypt=true" \
          -backend-config="use_lockfile=true"

  bootstrap:plan:
    desc: Plan the bootstrap OpenTofu stack
    dir: infra/aws/stacks/bootstrap
    cmds:
      - task: bootstrap:init
      - aws-login exec mbastakis -- tofu plan {{.CLI_ARGS}}

  bootstrap:apply:
    desc: Apply the bootstrap OpenTofu stack
    dir: infra/aws/stacks/bootstrap
    cmds:
      - task: bootstrap:init
      - aws-login exec mbastakis -- tofu apply {{.CLI_ARGS}}

  dns:init:
    desc: Initialize the DNS OpenTofu stack
    dir: infra/aws/stacks/dns
    cmds:
      - task: backend:check
      - |
        aws-login exec mbastakis -- tofu init \
          -input=false \
          -reconfigure \
          -backend-config="bucket={{.TF_STATE_BUCKET}}" \
          -backend-config="key=homeserver/dns/terraform.tfstate" \
          -backend-config="region={{.TF_STATE_REGION}}" \
          -backend-config="encrypt=true" \
          -backend-config="use_lockfile=true"

  dns:plan:
    desc: Plan the DNS OpenTofu stack
    dir: infra/aws/stacks/dns
    cmds:
      - task: dns:init
      - aws-login exec mbastakis -- tofu plan {{.CLI_ARGS}}

  dns:apply:
    desc: Apply the DNS OpenTofu stack
    dir: infra/aws/stacks/dns
    cmds:
      - task: dns:init
      - aws-login exec mbastakis -- tofu apply {{.CLI_ARGS}}

  foundation:init:
    desc: Initialize the AWS foundation OpenTofu stack
    dir: infra/aws/stacks/foundation
    cmds:
      - task: backend:check
      - |
        aws-login exec mbastakis -- tofu init \
          -input=false \
          -reconfigure \
          -backend-config="bucket={{.TF_STATE_BUCKET}}" \
          -backend-config="key=homeserver/aws-foundation/terraform.tfstate" \
          -backend-config="region={{.TF_STATE_REGION}}" \
          -backend-config="encrypt=true" \
          -backend-config="use_lockfile=true"

  foundation:plan:
    desc: Plan the AWS foundation OpenTofu stack
    dir: infra/aws/stacks/foundation
    cmds:
      - task: foundation:init
      - aws-login exec mbastakis -- tofu plan {{.CLI_ARGS}}

  foundation:apply:
    desc: Apply the AWS foundation OpenTofu stack
    dir: infra/aws/stacks/foundation
    cmds:
      - task: foundation:init
      - aws-login exec mbastakis -- tofu apply {{.CLI_ARGS}}
