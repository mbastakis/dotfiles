# yaml-language-server: $schema=../schemas/secret-metadata.schema.json
# Logical Bitwarden Secrets Manager aliases for homeserver automation.
# Values never live in Git. Only BWS project/secret IDs are committed.
schema_version: 1
ownership:
  scope: secrets.bws_metadata
  mode: bounded
project:
  name: homeserver
  id: b6b2ed62-40f0-446b-b39f-b475001583b9
secrets:
