    lifecycle: generated
    consumers: [atlas-authentik, atlas-homeserver]
    generation_method: Generate with a CSPRNG during Authentik bootstrap.
    rotation_runbook: docs/runbooks/homeserver-secret-rotation.md
    purpose: Authentik server secret key on atlas.
  authentik_postgres_password:
