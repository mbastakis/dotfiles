---
atlas_admin_user: mbastakis
atlas_admin_shell: /usr/bin/zsh
atlas_wired_interface: enp3s0
atlas_lan_ipv4: 192.168.1.19
atlas_lan_ipv4_reservation_verified: true
atlas_nvidia_gpu_model: NVIDIA GeForce GT 650M (GK107M)
atlas_nvidia_gpu_pci_id: "10de:0fd1"
atlas_nvidia_compute_capability: "3.0"
atlas_nvidia_immich_supported: false
atlas_immich_processing_mode: cpu
atlas_immich_runtime_root: /home/mbastakis/.local/share/immich
atlas_immich_runtime_storage: hdd
atlas_immich_memory_gib: 6.7
atlas_immich_swap_gib: 4
atlas_immich_local_storage_accepted: true
atlas_immich_preconditions_accepted: true
atlas_immich_host: photos.mbastakis.com
atlas_immich_nfs_server: 192.168.1.74
atlas_immich_nfs_export: /mnt/pool_4tb/homeserver/data/photos/immich
atlas_immich_sentinel_content: managed by infra/truenas/tofu
# Add independently verified TrueNAS Ed25519 public host keys as "ssh-ed25519 AAAA...".
# Multiple entries permit an explicit rotation overlap.
atlas_homeserver_truenas_backup_ssh_host_keys:
  - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMwBuh2v8x9K5xcjoxUQLI7l6Aq1emJ5qoRZIp4wnTQa
atlas_tailscale_hostname: atlas
atlas_tailscale_advertise_tags:
  - tag:homeserver-entry
atlas_tailscale_accept_dns: false
atlas_tailscale_accept_routes: false
atlas_tailscale_advertise_routes: []
atlas_tailscale_advertise_exit_node: false
atlas_tailscale_ssh: false
ansible_become_exe: /usr/bin/sudo.ws
ansible_become_flags: "-H -S"

atlas_admin_authorized_keys:
  - "{{ lookup('file', lookup('env', 'HOME') + '/.ssh/id_ed25519.pub') }}"

