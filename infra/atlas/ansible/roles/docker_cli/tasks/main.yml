---
- name: Install Docker repository prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Ensure apt keyring directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install Docker apt signing key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    owner: root
    group: root
    mode: "0644"

- name: Read Debian architecture
  ansible.builtin.command: dpkg --print-architecture
  register: docker_dpkg_arch
  changed_when: false

- name: Configure Docker apt repository
  ansible.builtin.deb822_repository:
    name: docker
    types:
      - deb
    uris:
      - https://download.docker.com/linux/ubuntu
    suites:
      - "{{ ansible_facts.distribution_release }}"
    components:
      - stable
    architectures:
      - "{{ docker_dpkg_arch.stdout }}"
    signed_by: /etc/apt/keyrings/docker.asc
    state: present

- name: Update apt cache after Docker repository changes
  ansible.builtin.apt:
    update_cache: true

- name: Install Docker Engine and CLI packages
  ansible.builtin.apt:
    name: "{{ atlas_docker_packages }}"
    state: present
    update_cache: true

- name: Ensure Docker service is enabled and running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Ensure atlas admin can use Docker
  ansible.builtin.user:
    name: "{{ atlas_admin_user }}"
    groups:
      - docker
    append: true
