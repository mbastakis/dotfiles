# Timewarrior configuration
# Managed by chezmoi — edit the source in:
#   ~/.local/share/chezmoi/private_dot_local/private_share/timewarrior/timewarrior.cfg
#
# Timewarrior insists on keeping config + data in the same directory
# ($TIMEWARRIORDB, set to $XDG_DATA_HOME/timewarrior in .zshenv). The data/
# subdir is ignored by chezmoi; only this cfg and mocha.theme are tracked.
#
# Canonical config reference:
#   https://timewarrior.net/docs/configuration/
# Exclusions reference:
#   https://timewarrior.net/docs/exclusions/

# -----------------------------------------------------------------------------
# Behavior
# -----------------------------------------------------------------------------

# Prompt before destructive commands (cancel, continue across intervals, etc.)
confirmation = yes

# Print context information after each command (blank line, header banner,
# summary, and active-tracking indicator). Omit `footer` so short commands
# stay terse.
verbose = blank, header, summary, context

# Turn off debug noise — the hook writes to stdout, extra chatter breaks some
# task integrations.
debug = off

# Store timestamps in the journal (audit trail) for undo support.
journal.size = 100

# -----------------------------------------------------------------------------
# Theme — Catppuccin Mocha, mirrors the companion `mocha.theme` used by
# Taskwarrior so both tools look visually consistent in the same terminal.
# -----------------------------------------------------------------------------

import ~/.local/share/timewarrior/mocha.theme

# -----------------------------------------------------------------------------
# Report tuning — sensible defaults for `timew day`, `timew week`, `timew
# month`, `timew summary`. See `man timew-report`.
# -----------------------------------------------------------------------------

# Show tag columns in day/week/month reports.
reports.day.tags     = yes
reports.week.tags    = yes
reports.month.tags   = yes

# 15-minute resolution per cell in the chart reports — fine-grained enough to
# spot context switches, coarse enough to stay readable in a terminal.
reports.day.cell     = 15
reports.week.cell    = 15
reports.month.cell   = 15

# Only show working hours in chart reports (filtered by the exclusions block
# below). Night/weekend time still gets tracked if you explicitly `timew
# start`, but the ambient empty hours don't dominate the chart.
reports.day.hours    = working
reports.week.hours   = working
reports.month.hours  = working

# Show weekly summary totals and holidays when relevant.
reports.day.summary  = yes
reports.week.summary = yes
reports.summary.holidays = yes

# -----------------------------------------------------------------------------
# Working hours — Mon-Fri 09:00-18:00 with a 13:00-14:00 lunch exclusion.
# Anything outside this window is treated as non-working time and hidden from
# `working`-scope charts / utilisation reports.
#
# Syntax: `< HH:MM` excludes everything before that time; `> HH:MM` excludes
# everything after. `HH:MM-HH:MM` excludes a span in the middle. Whole-day
# exclusions use the canonical `<0:00 >24:00` idiom from timew's own docs.
# -----------------------------------------------------------------------------

define exclusions:
  monday    = <9:00 13:00-14:00 >18:00
  tuesday   = <9:00 13:00-14:00 >18:00
  wednesday = <9:00 13:00-14:00 >18:00
  thursday  = <9:00 13:00-14:00 >18:00
  friday    = <9:00 13:00-14:00 >18:00
  saturday  = <0:00 >24:00
  sunday    = <0:00 >24:00

# -----------------------------------------------------------------------------
# Integration notes
# -----------------------------------------------------------------------------
#
# Taskwarrior -> Timewarrior bridge:
#   The on-modify.timewarrior hook (vendored at
#   ~/.config/task/hooks/on-modify.timewarrior) auto-runs `timew start/stop`
#   whenever you `task start N` / `task stop N`. Tags passed through:
#     - description (first positional tag)
#     - project     (as a tag)
#     - all +tags on the task
#     - UDAs        (ignored by the default hook body — only description/
#                    project/tags are forwarded)
#
# Useful one-liners:
#   timew                 # current tracking status
#   timew day             # today's intervals chart
#   timew week            # this week's chart
#   timew summary :week   # totals per tag this week
#   timew continue        # resume the last stopped interval
#   timew cancel          # abandon the active interval (no record)
