# Repo-local mise config for the chezmoi dotfiles repo.
# Source-only: excluded from chezmoi apply via .chezmoiignore.
#
# Installs go-task (registry key: `task`, aqua:go-task/task) so that inside
# this repo the `task` binary resolves to go-task for Taskfile.yml workflows.
# Outside the repo, `task` still resolves to the brew-installed Taskwarrior.
#
# Trust: this directory is pre-trusted via MISE_TRUSTED_CONFIG_PATHS in
# dot_zshenv.tmpl (resolves to $DOTFILES_PATH / chezmoi sourceDir).

[tools]
task = "3.50.0"
