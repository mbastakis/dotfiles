name: Validate

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install repository tools
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4

      - name: Install locked Python environment
        run: uv sync --project infra --locked

      - name: Verify npm lock files
        run: |
          npm --prefix private_dot_config/opencode ci --ignore-scripts
          npm --prefix infra/atlas/tests/taskboard-browser ci --ignore-scripts

      - name: Run offline infrastructure validation
        run: task infra:validate
